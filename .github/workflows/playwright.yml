name: Playwright Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout latest code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js (latest stable)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      - name: Ensure Allure Playwright is installed   
        run: npm install allure-playwright --save-dev

      # Install Playwright browsers + OS deps
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Run tests
      - name: Run Playwright tests
        run: npx playwright test

      - name: Check Allure Results Folder
        if: always()
        run: |
          echo "Checking allure-results folder..."
          ls -la
          ls -la allure-results || echo "allure-results NOT found"

      # Upload Playwright HTML Report
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          retention-days: 7

      # Add Java - 1
      - name: Install Java
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install Allure CLI - 2
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline


      - name: Ensure Allure Results Exist
        if: always()
        run: |
          if [ ! -d "allure-results" ]; then
            echo "allure-results folder missing"
          fi
                  
      # Generate Allure Report 
      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # For Debugging
      - name: Check Allure Results
        if: always()
        run: ls -la allure-report

      # Upload Allure Report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      # Upload raw test results (screenshots, videos, traces)
      - name: Upload Test Results (Debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7