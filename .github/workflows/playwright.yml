name: Playwright Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Run tests
      - name: Run Playwright tests
        run: npx playwright test

      # DEBUG: check allure-results
      - name: Debug Allure Results
        if: always()
        run: |
          echo "===== allure-results folder ====="
          ls -R allure-results || echo "allure-results NOT FOUND"

      # Upload Playwright HTML report
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          retention-days: 7

      # Setup Java (required for Allure CLI)
      - name: Install Java
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Install Allure CLI
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      # IMPORTANT CHECK
      - name: Validate Allure Results
        if: always()
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "ERROR: allure-results is missing or empty"
            exit 0
          else
            echo "allure-results found"
          fi

      # Generate Allure Report
      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # Debug report folder
      - name: Check Allure Report Output
        if: always()
        run: ls -R allure-report

      # Upload Allure Report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      # Upload raw test artifacts
      - name: Upload Test Results (Debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
